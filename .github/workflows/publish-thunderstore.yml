name: Publish To Thunderstore

on:
  pull_request:
    types:
      - closed
    branches:
      - deployment
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thunderstore-publish-deployment
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Attempt build to produce DLL
        continue-on-error: true
        run: dotnet build RearMirrorCruiser.csproj -c Release

      - name: Parse manifest metadata
        id: manifest
        shell: bash
        run: |
          echo "version=$(jq -r '.version_number' manifest.json)" >> "$GITHUB_OUTPUT"
          echo "description=$(jq -r '.description' manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Create Thunderstore zip package
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          $scriptPath = Join-Path (Get-Location) "scripts/package-thunderstore.ps1"
          if (Test-Path -LiteralPath $scriptPath) {
            & $scriptPath -OutputZip "artifacts/RearMirrorCruiser.zip"
          }
          else {
            Write-Warning "Packaging script not found at $scriptPath. Falling back to inline packaging."
            New-Item -ItemType Directory -Path "artifacts" -Force | Out-Null
            $dllPath = "bin/Release/netstandard2.1/RearMirrorCruiser.dll"
            if (-not (Test-Path -LiteralPath $dllPath)) {
              throw "RearMirrorCruiser.dll not found at $dllPath"
            }
            $stagingDir = Join-Path $env:RUNNER_TEMP "rmc-thunderstore-package-fallback"
            if (Test-Path -LiteralPath $stagingDir) {
              Remove-Item -LiteralPath $stagingDir -Recurse -Force
            }
            New-Item -ItemType Directory -Path $stagingDir | Out-Null
            Copy-Item -LiteralPath "README.md" -Destination (Join-Path $stagingDir "README.md")
            Copy-Item -LiteralPath "manifest.json" -Destination (Join-Path $stagingDir "manifest.json")
            Copy-Item -LiteralPath "icon.png" -Destination (Join-Path $stagingDir "icon.png")
            Copy-Item -LiteralPath $dllPath -Destination (Join-Path $stagingDir "RearMirrorCruiser.dll")
            Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath "artifacts/RearMirrorCruiser.zip" -Force
          }

      - name: Create GitHub release zip artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "artifacts/release" -Force | Out-Null
          Copy-Item -LiteralPath "artifacts/RearMirrorCruiser.zip" -Destination "artifacts/release/RearMirrorCruiser.zip" -Force

      - name: Verify release artifact exists
        shell: bash
        run: test -f artifacts/release/RearMirrorCruiser.zip

      - name: Upload to Thunderstore
        id: thunderstore_upload
        continue-on-error: true
        uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          community: lethal-company
          repo: thunderstore.io
          namespace: ItsJustLiliana
          name: RearMirrorCruiser
          version: ${{ steps.manifest.outputs.version }}
          description: ${{ steps.manifest.outputs.description }}
          categories: |
            vehicles
            clientside
            bepinex
          file: artifacts/RearMirrorCruiser.zip

      - name: Log Thunderstore upload outcome
        if: always()
        shell: bash
        run: |
          echo "Thunderstore upload outcome: ${{ steps.thunderstore_upload.outcome }}"
          echo "Thunderstore upload conclusion: ${{ steps.thunderstore_upload.conclusion }}"
          if [ "${{ steps.thunderstore_upload.outcome }}" != "success" ]; then
            echo "::warning::Thunderstore upload did not succeed. GitHub release will still be attempted."
          fi

      - name: Create GitHub Release
        if: always()
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.manifest.outputs.version }}
          name: Rear Mirror Cruiser
          body: ""
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: artifacts/release/RearMirrorCruiser.zip
